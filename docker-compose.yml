services:
  postgres:
    image: postgres:16
    container_name: posts-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: posts
    ports:
      - "5433:5432"
    volumes:
      - posts-data:/var/lib/postgresql/data

volumes:
  posts-data:
